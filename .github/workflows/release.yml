# Release: GoReleaser builds and publishes binaries when a v* tag is pushed.
#
# Security: actions pinned to full commit SHAs; contents:write is granted
# only to this job (needed to create the GitHub Release); checkout does not
# persist credentials — GoReleaser uses the explicitly-passed GITHUB_TOKEN.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # for build provenance attestation (Sigstore signing)
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history for the changelog
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          # No cache in the release job: a poisoned cache entry could end up
          # inside published binaries (zizmor: cache-poisoning).
          cache: false

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Signed build provenance for every released archive; users can verify
      # with: gh attestation verify <file> --repo tawAsh1/resolog
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
