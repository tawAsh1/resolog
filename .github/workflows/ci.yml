# CI: gofmt, vet, staticcheck, race-enabled tests, build, and windows/darwin
# cross-compiles on every push to main and every PR.
#
# Security: actions are pinned to full commit SHAs, the workflow gets
# read-only permissions, and checkout does not persist credentials.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: gofmt
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }

      - name: go vet
        run: go vet ./...

      # Pinned by version; fetched via the module proxy with go.sum-style
      # verification, and `go run` keeps it out of go.mod.
      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@2026.1 ./...

      - name: go test
        run: go test -race ./...

      - name: go build
        run: go build ./...

      # CI runs on linux; make sure platform-dependent code still cross-compiles
      # before a release tag finds out.
      - name: cross-compile
        run: |
          GOOS=windows GOARCH=amd64 go build ./...
          GOOS=darwin GOARCH=arm64 go build ./...
