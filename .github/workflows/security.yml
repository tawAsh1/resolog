# Security: govulncheck against the Go vulnerability database.
#
# Runs on pushes/PRs (catch vulnerable code paths as they're introduced) and
# weekly (catch newly published CVEs in existing dependencies without waiting
# for a commit).
name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "27 3 * * 1" # Mondays 03:27 UTC

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-file: go.mod
          go-package: ./...
