version: 2
project_name: resolog

builds:
  - main: ./cmd/resolog
    binary: resolog
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  use: github
  filters:
    exclude:
      - "^docs"
      - "^chore"
